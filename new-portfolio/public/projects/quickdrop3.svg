<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <rect width="1200" height="750" fill="#0b1426"/>
  <!-- Navy blue theme - Transfer complete summary -->
  <rect x="0" y="0" width="1200" height="52" fill="#0f1a33"/>
  <text x="40" y="34" font-family="monospace" font-size="17" font-weight="700" fill="#60a5fa">⚡ QuickDrop</text>
  <text x="1100" y="34" font-family="monospace" font-size="12" fill="#4b5563" text-anchor="end">Session Complete</text>

  <!-- Success banner -->
  <rect x="40" y="76" width="1120" height="80" rx="14" fill="#059669" opacity="0.12"/>
  <text x="600" y="110" font-family="sans-serif" font-size="22" font-weight="700" fill="#34d399" text-anchor="middle">✓ All Transfers Complete</text>
  <text x="600" y="138" font-family="monospace" font-size="13" fill="#6ee7b7" text-anchor="middle">7 files transferred successfully — 0 errors</text>

  <!-- Transfer summary cards -->
  <rect x="40" y="185" width="370" height="120" rx="12" fill="#111c38" stroke="#1e3055" stroke-width="1"/>
  <text x="60" y="218" font-family="sans-serif" font-size="11" fill="#6b7280">TOTAL DATA</text>
  <text x="60" y="260" font-family="monospace" font-size="38" font-weight="800" fill="#fff">8.7 GB</text>
  <text x="60" y="288" font-family="monospace" font-size="12" fill="#6b7280">across 7 files</text>

  <rect x="425" y="185" width="370" height="120" rx="12" fill="#111c38" stroke="#1e3055" stroke-width="1"/>
  <text x="445" y="218" font-family="sans-serif" font-size="11" fill="#6b7280">AVG SPEED</text>
  <text x="445" y="260" font-family="monospace" font-size="38" font-weight="800" fill="#60a5fa">31.2 MB/s</text>
  <text x="445" y="288" font-family="monospace" font-size="12" fill="#6b7280">peak: 34.8 MB/s</text>

  <rect x="810" y="185" width="350" height="120" rx="12" fill="#111c38" stroke="#1e3055" stroke-width="1"/>
  <text x="830" y="218" font-family="sans-serif" font-size="11" fill="#6b7280">DURATION</text>
  <text x="830" y="260" font-family="monospace" font-size="38" font-weight="800" fill="#fbbf24">4m 42s</text>
  <text x="830" y="288" font-family="monospace" font-size="12" fill="#6b7280">started 11:23 AM</text>

