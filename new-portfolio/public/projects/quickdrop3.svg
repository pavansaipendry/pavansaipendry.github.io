  <rect x="40" y="335" width="1120" height="340" rx="12" fill="#111c38" stroke="#1e3055" stroke-width="1"/>
  <text x="60" y="370" font-family="sans-serif" font-size="14" font-weight="600" fill="#d1d5db">Transfer Log</text>

  <g font-family="monospace" font-size="13">
    <text x="80" y="405" fill="#34d399">✓</text><text x="110" y="405" fill="#e5e7eb">vacation_photos.zip</text><text x="750" y="405" fill="#6b7280">2.4 GB</text><text x="950" y="405" fill="#34d399">34.1 MB/s</text><text x="1100" y="405" fill="#6b7280" text-anchor="end">1m 12s</text>
    <text x="80" y="435" fill="#34d399">✓</text><text x="110" y="435" fill="#e5e7eb">project_demo.mp4</text><text x="750" y="435" fill="#6b7280">3.1 GB</text><text x="950" y="435" fill="#60a5fa">32.4 MB/s</text><text x="1100" y="435" fill="#6b7280" text-anchor="end">1m 38s</text>
    <text x="80" y="465" fill="#34d399">✓</text><text x="110" y="465" fill="#e5e7eb">backup_2025.tar.gz</text><text x="750" y="465" fill="#6b7280">856 MB</text><text x="950" y="465" fill="#60a5fa">28.9 MB/s</text><text x="1100" y="465" fill="#6b7280" text-anchor="end">29s</text>
    <text x="80" y="495" fill="#34d399">✓</text><text x="110" y="495" fill="#e5e7eb">music_collection.zip</text><text x="750" y="495" fill="#6b7280">1.2 GB</text><text x="950" y="495" fill="#34d399">30.1 MB/s</text><text x="1100" y="495" fill="#6b7280" text-anchor="end">41s</text>
    <text x="80" y="525" fill="#34d399">✓</text><text x="110" y="525" fill="#e5e7eb">documents.pdf</text><text x="750" y="525" fill="#6b7280">45 MB</text><text x="950" y="525" fill="#fbbf24">31.8 MB/s</text><text x="1100" y="525" fill="#6b7280" text-anchor="end">1s</text>
    <text x="80" y="555" fill="#34d399">✓</text><text x="110" y="555" fill="#e5e7eb">screenshots/</text><text x="750" y="555" fill="#6b7280">890 MB</text><text x="950" y="555" fill="#60a5fa">29.7 MB/s</text><text x="1100" y="555" fill="#6b7280" text-anchor="end">30s</text>
    <text x="80" y="585" fill="#34d399">✓</text><text x="110" y="585" fill="#e5e7eb">app_release.apk</text><text x="750" y="585" fill="#6b7280">210 MB</text><text x="950" y="585" fill="#34d399">33.2 MB/s</text><text x="1100" y="585" fill="#6b7280" text-anchor="end">6s</text>
  </g>

  <!-- Device bar -->
  <rect x="40" y="695" width="1120" height="36" rx="8" fill="#0f1a33"/>
  <text x="60" y="718" font-family="monospace" font-size="12" fill="#60a5fa">MacBook Pro (M3)</text>
  <text x="560" y="718" font-family="monospace" font-size="14" fill="#374151">⟷ USB 3.0 ⟷</text>
  <text x="1100" y="718" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="end">Pixel 8 Pro (Android 15)</text>
</svg>
