<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg4)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="#161822" opacity="0.9"/>
  <text x="40" y="36" font-family="monospace" font-size="18" font-weight="700" fill="#06b6d4">💬 Emotion Chatbot</text>
  <rect x="880" y="16" width="80" height="24" rx="12" fill="#06b6d420"/>
  <text x="920" y="33" font-family="sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle">BERT+GPT</text>
  <text x="1080" y="36" font-family="monospace" font-size="12" fill="#666">89%+ Accuracy</text>

  <!-- Left: Chat area -->
  <rect x="40" y="80" width="580" height="580" rx="12" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="60" y="115" font-family="sans-serif" font-size="14" font-weight="600" fill="#ccc">Chat Session</text>
  <text x="590" y="115" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="end">Session #847</text>

  <!-- User message 1 -->
  <rect x="220" y="140" width="380" height="50" rx="10" fill="#06b6d420"/>
  <text x="240" y="162" font-family="sans-serif" font-size="13" fill="#ddd">I just got the job offer I've been</text>
  <text x="240" y="180" font-family="sans-serif" font-size="13" fill="#ddd">waiting for! I can't believe it!</text>

  <!-- Emotion tag -->
  <rect x="500" y="196" width="100" height="22" rx="11" fill="#34d39920"/>
  <text x="550" y="211" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">😊 Joy — 94%</text>

  <!-- Bot response 1 -->
  <rect x="60" y="225" width="400" height="70" rx="10" fill="#252840"/>
  <text x="80" y="247" font-family="sans-serif" font-size="13" fill="#aaa">That's absolutely wonderful news!</text>
  <text x="80" y="267" font-family="sans-serif" font-size="13" fill="#aaa">Congratulations! 🎉 You deserve this.</text>
  <text x="80" y="287" font-family="sans-serif" font-size="13" fill="#aaa">How are you feeling about the role?</text>

  <!-- User message 2 -->
  <rect x="260" y="310" width="340" height="50" rx="10" fill="#06b6d420"/>
  <text x="280" y="332" font-family="sans-serif" font-size="13" fill="#ddd">Honestly a bit nervous too. It's a</text>
  <text x="280" y="350" font-family="sans-serif" font-size="13" fill="#ddd">big step and I don't want to mess up</text>

  <!-- Emotion tag - mixed -->
  <rect x="440" y="366" width="160" height="22" rx="11" fill="#FBB83320"/>
  <text x="520" y="381" font-family="monospace" font-size="10" fill="#FBB833" text-anchor="middle">😰 Anxiety — 67% | Joy — 28%</text>

  <!-- Bot response 2 -->
  <rect x="60" y="395" width="420" height="70" rx="10" fill="#252840"/>
  <text x="80" y="417" font-family="sans-serif" font-size="13" fill="#aaa">It's completely natural to feel both</text>
  <text x="80" y="437" font-family="sans-serif" font-size="13" fill="#aaa">excited and nervous. That mix of emotions</text>
  <text x="80" y="457" font-family="sans-serif" font-size="13" fill="#aaa">shows you care about doing well.</text>

  <!-- User message 3 -->
  <rect x="300" y="480" width="300" height="35" rx="10" fill="#06b6d420"/>
  <text x="320" y="503" font-family="sans-serif" font-size="13" fill="#ddd">Thanks, that actually helps a lot 😊</text>

  <!-- Emotion tag -->
  <rect x="480" y="521" width="120" height="22" rx="11" fill="#34d39920"/>
  <text x="540" y="536" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">🙏 Gratitude — 91%</text>

  <!-- Input area -->
  <rect x="60" y="560" width="540" height="44" rx="8" fill="#111320" stroke="#2a2d42" stroke-width="1"/>
  <text x="80" y="587" font-family="sans-serif" font-size="13" fill="#555">Type your message...</text>
  <rect x="530" y="568" width="56" height="28" rx="6" fill="#06b6d4"/>
  <text x="558" y="587" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Send</text>

  <!-- Right: Analysis panel -->
  <rect x="640" y="80" width="520" height="340" rx="12" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="660" y="115" font-family="sans-serif" font-size="14" font-weight="600" fill="#ccc">Real-Time Emotion Analysis</text>

  <!-- Emotion breakdown chart -->
  <text x="660" y="150" font-family="sans-serif" font-size="12" fill="#888">Current Emotion Distribution</text>

  <!-- Joy bar -->
  <text x="660" y="180" font-family="sans-serif" font-size="12" fill="#aaa">Joy</text>
  <rect x="730" y="168" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="168" width="250" height="16" rx="3" fill="#34d399"/>
  <text x="1130" y="180" font-family="monospace" font-size="12" fill="#34d399" text-anchor="end">78%</text>

  <!-- Anxiety bar -->
  <text x="660" y="210" font-family="sans-serif" font-size="12" fill="#aaa">Anxiety</text>
  <rect x="730" y="198" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="198" width="112" height="16" rx="3" fill="#FBB833"/>
  <text x="1130" y="210" font-family="monospace" font-size="12" fill="#FBB833" text-anchor="end">35%</text>

  <!-- Gratitude bar -->
  <text x="660" y="240" font-family="sans-serif" font-size="12" fill="#aaa">Gratitude</text>
  <rect x="730" y="228" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="228" width="291" height="16" rx="3" fill="#06b6d4"/>
  <text x="1130" y="240" font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="end">91%</text>

  <!-- Sadness bar -->
  <text x="660" y="270" font-family="sans-serif" font-size="12" fill="#aaa">Sadness</text>
  <rect x="730" y="258" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="258" width="26" height="16" rx="3" fill="#7c5cfc"/>
  <text x="1130" y="270" font-family="monospace" font-size="12" fill="#7c5cfc" text-anchor="end">8%</text>

  <!-- Anger bar -->
  <text x="660" y="300" font-family="sans-serif" font-size="12" fill="#aaa">Anger</text>
  <rect x="730" y="288" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="288" width="10" height="16" rx="3" fill="#fa4D43"/>
  <text x="1130" y="300" font-family="monospace" font-size="12" fill="#fa4D43" text-anchor="end">3%</text>

  <!-- Fear bar -->
  <text x="660" y="330" font-family="sans-serif" font-size="12" fill="#aaa">Fear</text>
  <rect x="730" y="318" width="320" height="16" rx="3" fill="#2a2d42"/>
  <rect x="730" y="318" width="38" height="16" rx="3" fill="#F19EC8"/>
  <text x="1130" y="330" font-family="monospace" font-size="12" fill="#F19EC8" text-anchor="end">12%</text>

  <!-- Sentiment timeline -->
  <rect x="640" y="340" width="520" height="1" fill="#2a2d42"/>
  <text x="660" y="370" font-family="sans-serif" font-size="11" fill="#888">Emotion: BERT-base | Response: GPT-3.5</text>
  <text x="660" y="390" font-family="monospace" font-size="11" fill="#555">Latency: 142ms | Confidence: 91.2%</text>

  <!-- Bottom: Metrics -->
  <rect x="640" y="440" width="250" height="100" rx="10" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="660" y="470" font-family="sans-serif" font-size="11" fill="#888">DAILY USERS</text>
  <text x="660" y="505" font-family="monospace" font-size="30" font-weight="700" fill="#06b6d4">100+</text>
  <text x="660" y="528" font-family="monospace" font-size="11" fill="#666">beta testers</text>

  <rect x="910" y="440" width="250" height="100" rx="10" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="930" y="470" font-family="sans-serif" font-size="11" fill="#888">RESPONSE TIME</text>
  <text x="930" y="505" font-family="monospace" font-size="30" font-weight="700" fill="#34d399">&lt;150ms</text>
  <text x="930" y="528" font-family="monospace" font-size="11" fill="#666">p95 latency</text>

  <rect x="640" y="560" width="520" height="100" rx="10" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="660" y="590" font-family="sans-serif" font-size="11" fill="#888">EMOTION CLASSES</text>
  <g font-family="monospace" font-size="13">
    <rect x="660" y="605" width="60" height="24" rx="12" fill="#34d39920"/>
    <text x="690" y="622" fill="#34d399" text-anchor="middle">Joy</text>
    <rect x="730" y="605" width="75" height="24" rx="12" fill="#7c5cfc20"/>
    <text x="768" y="622" fill="#7c5cfc" text-anchor="middle">Sadness</text>
    <rect x="815" y="605" width="65" height="24" rx="12" fill="#fa4D4320"/>
    <text x="848" y="622" fill="#fa4D43" text-anchor="middle">Anger</text>
    <rect x="890" y="605" width="55" height="24" rx="12" fill="#F19EC820"/>
    <text x="918" y="622" fill="#F19EC8" text-anchor="middle">Fear</text>
    <rect x="955" y="605" width="80" height="24" rx="12" fill="#FBB83320"/>
    <text x="995" y="622" fill="#FBB833" text-anchor="middle">Surprise</text>
    <rect x="1045" y="605" width="80" height="24" rx="12" fill="#06b6d420"/>
    <text x="1085" y="622" fill="#06b6d4" text-anchor="middle">Disgust</text>
  </g>
  <text x="660" y="650" font-family="monospace" font-size="11" fill="#555">Model: BERT-base-uncased → GPT-3.5 hybrid pipeline | Streamlit UI</text>
</svg>
