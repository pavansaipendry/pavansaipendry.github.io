<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <rect width="1200" height="750" fill="#faf9f6"/>
  <!-- Light cream theme - API Documentation -->
  <rect x="0" y="0" width="260" height="750" fill="#fff" stroke="#e8e5df" stroke-width="1"/>
  <text x="30" y="40" font-family="monospace" font-size="16" font-weight="700" fill="#92400e">📈 Market Data API</text>
  <text x="30" y="60" font-family="monospace" font-size="11" fill="#a1a1aa">v3.2.0 — FastAPI</text>

  <!-- Sidebar nav -->
  <rect x="10" y="85" width="240" height="32" rx="6" fill="#fef3c7"/>
  <text x="30" y="106" font-family="sans-serif" font-size="13" font-weight="600" fill="#92400e">● Endpoints</text>
  <text x="40" y="140" font-family="sans-serif" font-size="12" fill="#78716c">GET /quotes/{symbol}</text>
  <text x="40" y="165" font-family="sans-serif" font-size="12" fill="#78716c">GET /quotes/batch</text>
  <text x="40" y="190" font-family="sans-serif" font-size="12" fill="#78716c">GET /history/{symbol}</text>
  <text x="40" y="215" font-family="sans-serif" font-size="12" fill="#78716c">WS /stream</text>
  <text x="30" y="255" font-family="sans-serif" font-size="13" font-weight="600" fill="#57534e">Models</text>
  <text x="40" y="280" font-family="sans-serif" font-size="12" fill="#78716c">Quote</text>
  <text x="40" y="305" font-family="sans-serif" font-size="12" fill="#78716c">OHLCV</text>
  <text x="40" y="330" font-family="sans-serif" font-size="12" fill="#78716c">MovingAverage</text>
  <text x="30" y="370" font-family="sans-serif" font-size="13" font-weight="600" fill="#57534e">Infrastructure</text>
  <text x="40" y="395" font-family="sans-serif" font-size="12" fill="#78716c">Kafka Topics</text>
  <text x="40" y="420" font-family="sans-serif" font-size="12" fill="#78716c">Redis Cache</text>
  <text x="40" y="445" font-family="sans-serif" font-size="12" fill="#78716c">PostgreSQL</text>

  <!-- Main content -->
  <text x="300" y="45" font-family="sans-serif" font-size="24" font-weight="700" fill="#1c1917">GET /quotes/{symbol}</text>
  <text x="300" y="72" font-family="sans-serif" font-size="14" fill="#78716c">Fetch real-time quote for a stock symbol with Redis caching</text>

  <!-- Endpoint box -->
  <rect x="300" y="95" width="860" height="44" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
  <rect x="312" y="105" width="50" height="24" rx="4" fill="#22c55e"/>
  <text x="337" y="122" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">GET</text>
  <text x="380" y="122" font-family="monospace" font-size="14" fill="#166534">/api/v1/quotes/{symbol}</text>

  <!-- Parameters -->
  <text x="300" y="175" font-family="sans-serif" font-size="16" font-weight="600" fill="#1c1917">Parameters</text>
  <rect x="300" y="190" width="860" height="90" rx="8" fill="#fff" stroke="#e8e5df" stroke-width="1"/>
  <text x="320" y="218" font-family="monospace" font-size="13" fill="#92400e">symbol</text>
  <text x="420" y="218" font-family="sans-serif" font-size="13" fill="#78716c">string — Stock ticker symbol (e.g., AAPL, GOOGL)</text>
  <rect x="850" y="204" width="70" height="22" rx="4" fill="#fef3c7"/>
  <text x="885" y="220" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">required</text>
  <text x="320" y="255" font-family="monospace" font-size="13" fill="#92400e">interval</text>
  <text x="420" y="255" font-family="sans-serif" font-size="13" fill="#78716c">string — Time interval: 1m, 5m, 1h, 1d (default: 1m)</text>
  <rect x="850" y="241" width="70" height="22" rx="4" fill="#f5f5f4"/>
  <text x="885" y="257" font-family="sans-serif" font-size="11" fill="#78716c" text-anchor="middle">optional</text>

  <!-- Response -->
  <text x="300" y="320" font-family="sans-serif" font-size="16" font-weight="600" fill="#1c1917">Response — 200 OK</text>
  <rect x="300" y="335" width="860" height="280" rx="8" fill="#1c1917"/>
  <g font-family="monospace" font-size="13">
    <text x="320" y="362" fill="#78716c">// Response from Redis cache — 3ms</text>
    <text x="320" y="387" fill="#fbbf24">{</text>
    <text x="340" y="412" fill="#60a5fa">"symbol"</text><text x="430" y="412" fill="#a1a1aa">:</text><text x="445" y="412" fill="#34d399">"AAPL"</text><text x="510" y="412" fill="#a1a1aa">,</text>
    <text x="340" y="437" fill="#60a5fa">"price"</text><text x="420" y="437" fill="#a1a1aa">:</text><text x="445" y="437" fill="#c084fc">189.42</text><text x="510" y="437" fill="#a1a1aa">,</text>
    <text x="340" y="462" fill="#60a5fa">"change"</text><text x="430" y="462" fill="#a1a1aa">:</text><text x="445" y="462" fill="#c084fc">+2.34</text><text x="510" y="462" fill="#a1a1aa">,</text>
    <text x="340" y="487" fill="#60a5fa">"pct_change"</text><text x="460" y="487" fill="#a1a1aa">:</text><text x="480" y="487" fill="#c084fc">1.25</text><text x="520" y="487" fill="#a1a1aa">,</text>
    <text x="340" y="512" fill="#60a5fa">"volume"</text><text x="430" y="512" fill="#a1a1aa">:</text><text x="445" y="512" fill="#c084fc">48293847</text><text x="530" y="512" fill="#a1a1aa">,</text>
    <text x="340" y="537" fill="#60a5fa">"moving_avg_20"</text><text x="480" y="537" fill="#a1a1aa">:</text><text x="500" y="537" fill="#c084fc">186.78</text><text x="560" y="537" fill="#a1a1aa">,</text>
    <text x="340" y="562" fill="#60a5fa">"timestamp"</text><text x="460" y="562" fill="#a1a1aa">:</text><text x="480" y="562" fill="#34d399">"2025-06-12T14:30:00Z"</text>
    <text x="320" y="592" fill="#fbbf24">}</text>
  </g>

  <!-- Cache info -->
  <rect x="300" y="635" width="420" height="70" rx="10" fill="#fff" stroke="#e8e5df" stroke-width="1"/>
  <text x="320" y="660" font-family="sans-serif" font-size="11" fill="#a1a1aa">REDIS CACHE</text>
  <text x="320" y="688" font-family="monospace" font-size="16" font-weight="600" fill="#22c55e">TTL: 60s | Hit rate: 94.2%</text>

  <rect x="740" y="635" width="420" height="70" rx="10" fill="#fff" stroke="#e8e5df" stroke-width="1"/>
  <text x="760" y="660" font-family="sans-serif" font-size="11" fill="#a1a1aa">KAFKA TOPIC</text>
  <text x="760" y="688" font-family="monospace" font-size="16" font-weight="600" fill="#92400e">stock.quotes.realtime</text>
</svg>
