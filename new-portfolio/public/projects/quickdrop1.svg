  <rect x="520" y="280" width="400" height="3" rx="2" fill="#2a2d42"/>
  <rect x="520" y="280" width="232" height="3" rx="2" fill="#3b82f6"/>
  <text x="1060" y="262" font-family="sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">58%</text>

  <!-- File 3 - queued -->
  <rect x="440" y="305" width="700" height="70" rx="8" fill="#252840"/>
  <rect x="460" y="320" width="40" height="40" rx="6" fill="#FBB83320"/>
  <text x="480" y="346" font-family="monospace" font-size="16" fill="#FBB833" text-anchor="middle">📄</text>
  <text x="520" y="338" font-family="sans-serif" font-size="14" fill="#ddd">backup_2025.tar.gz</text>
  <text x="520" y="358" font-family="monospace" font-size="11" fill="#666">856 MB — Queued</text>
  <rect x="1020" y="332" width="80" height="24" rx="12" fill="#FBB83320"/>
  <text x="1060" y="349" font-family="sans-serif" font-size="11" fill="#FBB833" text-anchor="middle">Waiting</text>

  <!-- Stats bar -->
  <rect x="440" y="400" width="700" height="1" fill="#2a2d42"/>
  <rect x="440" y="420" width="160" height="56" rx="8" fill="#252840"/>
  <text x="460" y="441" font-family="sans-serif" font-size="10" fill="#666">SPEED</text>
  <text x="460" y="463" font-family="monospace" font-size="18" font-weight="700" fill="#34d399">32.4 MB/s</text>

  <rect x="620" y="420" width="160" height="56" rx="8" fill="#252840"/>
  <text x="640" y="441" font-family="sans-serif" font-size="10" fill="#666">TRANSFERRED</text>
  <text x="640" y="463" font-family="monospace" font-size="18" font-weight="700" fill="#fff">4.2 GB</text>

  <rect x="800" y="420" width="160" height="56" rx="8" fill="#252840"/>
  <text x="820" y="441" font-family="sans-serif" font-size="10" fill="#666">CONNECTION</text>
  <text x="820" y="463" font-family="monospace" font-size="18" font-weight="700" fill="#34d399">ADB</text>

  <!-- Device status -->
  <rect x="440" y="500" width="340" height="60" rx="8" fill="#252840"/>
  <circle cx="465" cy="530" r="6" fill="#34d399"/>
  <text x="485" y="525" font-family="sans-serif" font-size="13" fill="#ddd">MacBook Pro</text>
  <text x="485" y="543" font-family="monospace" font-size="11" fill="#666">macOS — Connected</text>

  <text x="610" y="530" font-family="monospace" font-size="18" fill="#444">⟷</text>

  <rect x="660" y="500" width="340" height="60" rx="8" fill="#252840"/>
  <circle cx="685" cy="530" r="6" fill="#34d399"/>
  <text x="705" y="525" font-family="sans-serif" font-size="13" fill="#ddd">Pixel 8 Pro</text>
  <text x="705" y="543" font-family="monospace" font-size="11" fill="#666">Android 15 — USB 3.0</text>

  <!-- Bottom terminal -->
  <rect x="40" y="580" width="340" height="80" rx="8" fill="#111320" stroke="#2a2d42" stroke-width="1"/>
  <text x="60" y="604" font-family="monospace" font-size="11" fill="#555">$ quickdrop --adb --port 5000</text>
  <text x="60" y="622" font-family="monospace" font-size="11" fill="#34d399">✓ Server running on 0.0.0.0:5000</text>
  <text x="60" y="640" font-family="monospace" font-size="11" fill="#34d399">✓ ADB device connected</text>
</svg>
