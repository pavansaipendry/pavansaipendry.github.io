<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="56" fill="#161822" opacity="0.9"/>
  <text x="40" y="36" font-family="monospace" font-size="18" font-weight="700" fill="#34d399">⚡ QuickDrop</text>
  <text x="1060" y="36" font-family="monospace" font-size="13" fill="#666">v2.1.0</text>

  <!-- Left panel: QR Code area -->
  <rect x="40" y="80" width="340" height="380" rx="12" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="210" y="115" font-family="sans-serif" font-size="14" fill="#888" text-anchor="middle">SCAN TO CONNECT</text>
  <!-- QR Code mock -->
  <rect x="100" y="140" width="220" height="220" rx="8" fill="#111320"/>
  <g fill="#34d399" opacity="0.8">
    <rect x="115" y="155" width="30" height="30" rx="2"/>
    <rect x="155" y="155" width="15" height="15" rx="1"/>
    <rect x="180" y="155" width="15" height="15" rx="1"/>
    <rect x="205" y="155" width="15" height="15" rx="1"/>
    <rect x="230" y="155" width="15" height="15" rx="1"/>
    <rect x="275" y="155" width="30" height="30" rx="2"/>
    <rect x="115" y="195" width="15" height="15" rx="1"/>
    <rect x="155" y="195" width="15" height="15" rx="1"/>
    <rect x="205" y="195" width="15" height="15" rx="1"/>
    <rect x="255" y="195" width="15" height="15" rx="1"/>
    <rect x="275" y="195" width="15" height="15" rx="1"/>
    <rect x="115" y="220" width="15" height="15" rx="1"/>
    <rect x="155" y="220" width="15" height="15" rx="1"/>
    <rect x="180" y="220" width="15" height="15" rx="1"/>
    <rect x="230" y="220" width="15" height="15" rx="1"/>
    <rect x="275" y="220" width="15" height="15" rx="1"/>
    <rect x="115" y="245" width="15" height="15" rx="1"/>
    <rect x="180" y="245" width="15" height="15" rx="1"/>
    <rect x="205" y="245" width="15" height="15" rx="1"/>
    <rect x="230" y="245" width="15" height="15" rx="1"/>
    <rect x="255" y="245" width="15" height="15" rx="1"/>
    <rect x="115" y="310" width="30" height="30" rx="2"/>
    <rect x="155" y="310" width="15" height="15" rx="1"/>
    <rect x="180" y="310" width="15" height="15" rx="1"/>
    <rect x="230" y="310" width="15" height="15" rx="1"/>
    <rect x="275" y="310" width="30" height="30" rx="2"/>
  </g>
  <rect x="100" y="380" width="220" height="32" rx="6" fill="#34d399" opacity="0.15"/>
  <text x="210" y="401" font-family="monospace" font-size="12" fill="#34d399" text-anchor="middle">192.168.1.42:5000</text>
  <text x="210" y="445" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">WiFi: HomeNetwork_5G</text>

  <!-- Right panel: Transfer list -->
  <rect x="420" y="80" width="740" height="580" rx="12" fill="#1e2030" stroke="#2a2d42" stroke-width="1"/>
  <text x="450" y="115" font-family="sans-serif" font-size="14" font-weight="600" fill="#ccc">Active Transfers</text>
  <text x="1080" y="115" font-family="monospace" font-size="12" fill="#34d399" text-anchor="end">3 files</text>

  <!-- File 1 - complete -->
  <rect x="440" y="135" width="700" height="70" rx="8" fill="#252840"/>
  <rect x="460" y="150" width="40" height="40" rx="6" fill="#34d39920"/>
  <text x="480" y="176" font-family="monospace" font-size="16" fill="#34d399" text-anchor="middle">📁</text>
  <text x="520" y="168" font-family="sans-serif" font-size="14" fill="#ddd">vacation_photos.zip</text>
  <text x="520" y="188" font-family="monospace" font-size="11" fill="#666">2.4 GB — Completed in 1m 23s</text>
  <rect x="1020" y="160" width="80" height="24" rx="12" fill="#34d39920"/>
  <text x="1060" y="177" font-family="sans-serif" font-size="11" fill="#34d399" text-anchor="middle">Done ✓</text>

  <!-- File 2 - in progress -->
  <rect x="440" y="220" width="700" height="70" rx="8" fill="#252840"/>
  <rect x="460" y="235" width="40" height="40" rx="6" fill="#3b82f620"/>
  <text x="480" y="261" font-family="monospace" font-size="16" fill="#3b82f6" text-anchor="middle">🎬</text>
  <text x="520" y="253" font-family="sans-serif" font-size="14" fill="#ddd">project_demo.mp4</text>
  <text x="520" y="273" font-family="monospace" font-size="11" fill="#666">1.8 GB / 3.1 GB — 32.4 MB/s</text>
