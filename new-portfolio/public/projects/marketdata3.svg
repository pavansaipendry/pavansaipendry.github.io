  <text x="60" y="635" font-family="monospace" font-size="11" fill="#71717a">Mar</text>
  <text x="200" y="635" font-family="monospace" font-size="11" fill="#71717a">Apr</text>
  <text x="340" y="635" font-family="monospace" font-size="11" fill="#71717a">May</text>
  <text x="466" y="635" font-family="monospace" font-size="11" fill="#71717a">Jun</text>

  <text x="60" y="690" font-family="sans-serif" font-size="12" fill="#71717a">Total downtime: 4m 18s | Incidents: 1 (Finnhub rate limit, auto-recovered)</text>
  <text x="1130" y="690" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="end">docker-compose up -d</text>
